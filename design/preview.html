<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>시안 미리보기 | WOONGJIN IT</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #111827;
        --ink-sub: #374151;
        --ink-muted: #6b7280;
        --line: #e5e7eb;
        --blue: #0066ff;
        --blue-soft: #eff6ff;
        --bg: #f3f4f6;
        --toolbar-offset: 72px;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          "Pretendard",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          "Noto Sans KR",
          sans-serif;
        background: var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      .toolbar-shell {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        transition:
          transform 0.32s var(--ease),
          visibility 0.32s var(--ease);
      }

      body.is-toolbar-hidden .toolbar-shell {
        transform: translateY(-100%);
        visibility: hidden;
        pointer-events: none;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem 1.5rem;
        flex-wrap: wrap;
        padding: 0.875rem 1.25rem;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }

      .toolbar__left {
        display: flex;
        align-items: center;
        gap: 1rem;
        min-width: 0;
        flex-shrink: 0;
      }

      .toolbar__back {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.5rem 0.875rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--ink);
        text-decoration: none;
        white-space: nowrap;
      }

      .toolbar__back:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      .toolbar__meta {
        display: flex;
        flex-direction: column;
        gap: 0.125rem;
        min-width: 0;
      }

      .toolbar__label {
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .toolbar__src {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--ink-muted);
        white-space: nowrap;
      }

      .toolbar__tabs {
        display: flex;
        align-items: stretch;
        flex: 1;
        justify-content: center;
        gap: 0.375rem;
        min-width: 0;
      }

      .toolbar__tab {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.125rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        font: inherit;
        color: var(--ink-sub);
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .toolbar__tab:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      .toolbar__tab.is-active {
        border-color: var(--blue);
        background: var(--blue-soft);
        color: var(--blue);
      }

      .toolbar__tab-name {
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .toolbar__tab-size {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--ink-muted);
        font-variant-numeric: tabular-nums;
      }

      .toolbar__tab.is-active .toolbar__tab-size,
      .toolbar__tab:hover .toolbar__tab-size {
        color: var(--blue);
      }

      .toolbar__actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
      }

      .toolbar__collapse,
      .toolbar-reveal {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 0.875rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        white-space: nowrap;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink-sub);
        cursor: pointer;
        font: inherit;
        line-height: 1.25;
        min-height: 2.375rem;
        box-sizing: border-box;
      }

      .toolbar__collapse:hover,
      .toolbar-reveal:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      .toolbar-reveal {
        position: fixed;
        top: 0.875rem;
        right: 1.25rem;
        left: auto;
        z-index: 30;
        transform: translateY(-160%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          transform 0.32s var(--ease),
          opacity 0.28s var(--ease),
          visibility 0.32s var(--ease),
          border-color 0.2s ease,
          color 0.2s ease;
      }

      body.is-toolbar-hidden .toolbar-reveal {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .stage {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100dvh;
        padding: 1.5rem;
        padding-top: calc(var(--toolbar-h, 72px) + 1.5rem);
        overflow: auto;
        overscroll-behavior: contain;
        scrollbar-width: none;
        -ms-overflow-style: none;
        transition:
          padding-top 0.32s var(--ease),
          padding-left 0.32s var(--ease),
          padding-right 0.32s var(--ease),
          padding-bottom 0.32s var(--ease);
      }

      .stage::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      body.is-toolbar-hidden .stage {
        padding: 0;
      }

      .frame-wrap {
        flex-shrink: 0;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(0, 0, 0, 0.06);
        background: #fff;
        transition:
          border-radius 0.32s var(--ease),
          box-shadow 0.32s var(--ease);
      }

      body.is-toolbar-hidden .frame-wrap {
        border-radius: 0;
        box-shadow: none;
      }

      .frame-wrap iframe {
        display: block;
        border: 0;
        background: #fff;
      }

      .error {
        padding: 3rem 1.5rem;
        text-align: center;
        color: var(--ink-muted);
      }

      .error a {
        color: var(--blue);
      }

      @media (max-width: 900px) {
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar__left {
          width: 100%;
        }

        .toolbar__tabs {
          width: 100%;
          justify-content: stretch;
        }

        .toolbar__tab {
          flex: 1;
          min-width: 0;
          padding: 0.625rem 0.5rem;
        }

        .toolbar__actions {
          width: 100%;
          justify-content: flex-end;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .toolbar-shell,
        .toolbar-reveal,
        .stage,
        .frame-wrap {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar-shell" id="toolbar-shell">
      <header class="toolbar">
        <div class="toolbar__left">
          <a class="toolbar__back" href="_dashboard.html">← 시안 목록</a>
          <div class="toolbar__meta">
            <span class="toolbar__label" id="preview-label">미리보기</span>
            <span class="toolbar__src" id="preview-src"></span>
          </div>
        </div>
        <nav class="toolbar__tabs" id="preview-tabs" aria-label="해상도 선택"></nav>
        <div class="toolbar__actions">
          <button
            type="button"
            class="toolbar__collapse"
            id="toolbar-collapse"
            aria-expanded="true"
            aria-controls="toolbar-shell"
          >
            상단 닫기
          </button>
        </div>
      </header>
    </div>

    <button type="button" class="toolbar-reveal" id="toolbar-reveal" hidden aria-label="상단 열기">
      상단 열기
    </button>

    <main class="stage" id="stage">
      <div class="frame-wrap" id="frame-wrap" hidden>
        <iframe id="preview-frame" title="시안 미리보기" tabindex="-1"></iframe>
      </div>
      <p class="error" id="preview-error" hidden>
        잘못된 미리보기 주소입니다.
        <a href="_dashboard.html">시안 목록으로 돌아가기</a>
      </p>
    </main>

    <script>
      (function () {
        var VIEWPORTS = [
          { label: "모바일", w: 390, h: 844 },
          { label: "패드", w: 1366, h: 1024 },
          { label: "데스크탑", w: 1920, h: 1080 },
          { label: "고해상도", w: 2560, h: 1440 },
          { label: "4K", w: 3840, h: 2160 },
        ];

        var HI_RES_MIN = 2560;
        var params = new URLSearchParams(window.location.search);
        var src = params.get("src");
        var w = parseInt(params.get("w"), 10);
        var h = parseInt(params.get("h"), 10);
        var label = params.get("label") || "미리보기";

        var frame = document.getElementById("preview-frame");
        var frameWrap = document.getElementById("frame-wrap");
        var error = document.getElementById("preview-error");
        var labelEl = document.getElementById("preview-label");
        var srcEl = document.getElementById("preview-src");
        var tabsEl = document.getElementById("preview-tabs");
        var collapseBtn = document.getElementById("toolbar-collapse");
        var revealBtn = document.getElementById("toolbar-reveal");
        var toolbarShell = document.getElementById("toolbar-shell");

        var userToolbarPref = null;

        var IFRAME_SCROLLBAR_HIDE_CSS =
          "html,body{scrollbar-width:none;-ms-overflow-style:none}" +
          "html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0}" +
          "*{scrollbar-width:none;-ms-overflow-style:none}" +
          "*::-webkit-scrollbar{display:none;width:0;height:0}";

        function getIframeDocument() {
          try {
            return frame.contentDocument;
          } catch (_) {
            return null;
          }
        }

        function hideIframeScrollbars() {
          var doc = getIframeDocument();
          if (!doc || !doc.documentElement) return;
          if (doc.getElementById("preview-scrollbar-hide")) return;
          var style = doc.createElement("style");
          style.id = "preview-scrollbar-hide";
          style.textContent = IFRAME_SCROLLBAR_HIDE_CSS;
          (doc.head || doc.documentElement).appendChild(style);
        }

        function iframeSrcWithCacheBust(path) {
          if (!path) return path;
          var base = path.split("#")[0];
          var hash = path.indexOf("#") >= 0 ? path.slice(path.indexOf("#")) : "";
          var q = base.indexOf("?");
          var pathOnly = q >= 0 ? base.slice(0, q) : base;
          var params = new URLSearchParams(q >= 0 ? base.slice(q + 1) : "");
          params.set("pv", String(Date.now()));
          return pathOnly + "?" + params.toString() + hash;
        }

        function applyFrameSize() {
          frame.width = w;
          frame.height = h;
          frame.setAttribute("width", String(w));
          frame.setAttribute("height", String(h));
          frame.style.width = "";
          frame.style.height = "";
          frame.scrolling = "yes";
          frame.removeAttribute("scrolling");
          hideIframeScrollbars();
        }

        function syncToolbarHeight() {
          if (document.body.classList.contains("is-toolbar-hidden")) {
            document.documentElement.style.setProperty("--toolbar-h", "0px");
            return;
          }
          document.documentElement.style.setProperty(
            "--toolbar-h",
            toolbarShell.offsetHeight + "px"
          );
        }

        if (!src || !w || !h || w < 280 || h < 400) {
          error.hidden = false;
          collapseBtn.hidden = true;
          tabsEl.hidden = true;
          revealBtn.hidden = true;
          return;
        }

        function srcPathOnly(raw) {
          if (!raw) return "";
          return raw.split("#")[0].split("?")[0];
        }

        function srcDisplayName(path) {
          var match = srcPathOnly(path).match(/시안(\d)/);
          return match ? "시안 " + match[1] : srcPathOnly(path);
        }

        function pathFromIframeLocation(loc) {
          var pathname = decodeURIComponent(loc.pathname || "");
          var match = pathname.match(/(시안\d\/[^/]+)$/);
          if (match) return match[1] + (loc.search || "") + (loc.hash || "");
          var parts = pathname.split(/[/\\]/).filter(Boolean);
          if (parts.length >= 2) return parts.slice(-2).join("/") + (loc.search || "") + (loc.hash || "");
          return (parts[parts.length - 1] || "") + (loc.search || "") + (loc.hash || "");
        }

        function applySrcUpdate(nextSrc, usePushState) {
          if (!nextSrc || nextSrc === src) return false;

          src = nextSrc;
          srcEl.textContent = srcDisplayName(src);

          var nextParams = new URLSearchParams(window.location.search);
          nextParams.set("src", src);
          nextParams.set("w", String(w));
          nextParams.set("h", String(h));
          nextParams.set("label", label);
          var nextUrl = "preview.html?" + nextParams.toString();
          if (usePushState) history.pushState(null, "", nextUrl);
          else history.replaceState(null, "", nextUrl);
          return true;
        }

        function syncUrlFromIframe(usePushState) {
          var loc;
          try {
            loc = frame.contentWindow.location;
          } catch (err) {
            return false;
          }

          return applySrcUpdate(pathFromIframeLocation(loc), usePushState);
        }

        function isHiRes(width) {
          return width >= HI_RES_MIN;
        }

        function setToolbarCollapsed(collapsed) {
          document.body.classList.toggle("is-toolbar-hidden", collapsed);
          collapseBtn.setAttribute("aria-expanded", collapsed ? "false" : "true");
          revealBtn.hidden = !collapsed;
          syncToolbarHeight();
        }

        function syncToolbarForViewport(width) {
          if (userToolbarPref === "open") {
            setToolbarCollapsed(false);
            return;
          }
          if (userToolbarPref === "closed") {
            setToolbarCollapsed(true);
            return;
          }
          setToolbarCollapsed(isHiRes(width));
        }

        collapseBtn.addEventListener("click", function () {
          userToolbarPref = "closed";
          setToolbarCollapsed(true);
        });

        revealBtn.addEventListener("click", function () {
          userToolbarPref = "open";
          setToolbarCollapsed(false);
        });

        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          if (document.body.classList.contains("is-toolbar-hidden")) {
            userToolbarPref = "open";
            setToolbarCollapsed(false);
          } else {
            userToolbarPref = "closed";
            setToolbarCollapsed(true);
          }
        });

        function isActive(viewport) {
          return viewport.w === w && viewport.h === h;
        }

        function applyViewport(viewport, reloadFrame, usePushState) {
          w = viewport.w;
          h = viewport.h;
          label = viewport.label;

          labelEl.textContent = label;
          srcEl.textContent = srcDisplayName(src);
          if (reloadFrame) {
            frame.src = iframeSrcWithCacheBust(src);
          } else {
            try {
              frame.contentWindow.postMessage({ type: "preview-viewport-resize" }, "*");
            } catch (_) {}
          }
          document.title = label + " " + w + "×" + h + " | WOONGJIN IT";

          var nextParams = new URLSearchParams(window.location.search);
          nextParams.set("src", src);
          nextParams.set("w", String(w));
          nextParams.set("h", String(h));
          nextParams.set("label", label);
          var nextUrl = "preview.html?" + nextParams.toString();
          if (usePushState) {
            history.pushState(null, "", nextUrl);
          } else {
            history.replaceState(null, "", nextUrl);
          }

          tabsEl.querySelectorAll(".toolbar__tab").forEach(function (tab) {
            var active = tab.dataset.w === String(w) && tab.dataset.h === String(h);
            tab.classList.toggle("is-active", active);
            tab.setAttribute("aria-current", active ? "page" : "false");
          });

          syncToolbarForViewport(w);
          applyFrameSize();
        }

        VIEWPORTS.forEach(function (viewport) {
          var tab = document.createElement("button");
          tab.type = "button";
          tab.className = "toolbar__tab" + (isActive(viewport) ? " is-active" : "");
          tab.dataset.w = String(viewport.w);
          tab.dataset.h = String(viewport.h);
          tab.setAttribute("aria-current", isActive(viewport) ? "page" : "false");

          var name = document.createElement("span");
          name.className = "toolbar__tab-name";
          name.textContent = viewport.label;

          var size = document.createElement("span");
          size.className = "toolbar__tab-size";
          size.textContent = viewport.w + " × " + viewport.h;

          tab.appendChild(name);
          tab.appendChild(size);

          tab.addEventListener("click", function () {
            if (isActive(viewport)) return;
            userToolbarPref = null;
            applyViewport(viewport, true, true);
          });

          tabsEl.appendChild(tab);
        });

        window.addEventListener("popstate", function () {
          var p = new URLSearchParams(window.location.search);
          var nextSrc = p.get("src");
          var nextW = parseInt(p.get("w"), 10);
          var nextH = parseInt(p.get("h"), 10);
          var nextLabel = p.get("label") || "미리보기";

          if (nextSrc && nextSrc !== src) {
            src = nextSrc;
            frame.src = iframeSrcWithCacheBust(src);
            srcEl.textContent = srcDisplayName(src);
          }

          if (!nextW || !nextH) return;
          var matched = VIEWPORTS.find(function (v) {
            return v.w === nextW && v.h === nextH;
          });
          if (!matched) return;
          if (matched.w === w && matched.h === h && nextLabel === label) return;

          userToolbarPref = null;
          label = nextLabel;
          applyViewport(matched, false, false);
        });

        frame.addEventListener("load", function () {
          applyFrameSize();
          syncUrlFromIframe(false);
        });

        window.addEventListener("message", function (e) {
          if (e.source !== frame.contentWindow) return;
          if (!e.data) return;
          if (e.data.type !== "preview-iframe-src") return;
          if (e.data.src) {
            applySrcUpdate(e.data.src, false);
            return;
          }
          syncUrlFromIframe(false);
        });

        function focusPreviewFrame() {
          try {
            frame.focus({ preventScroll: true });
          } catch (_) {
            frame.focus();
          }
        }

        function forwardWheelToFrame(e) {
          var win = frame.contentWindow;
          if (!win) return;
          try {
            win.dispatchEvent(
              new WheelEvent("wheel", {
                deltaX: e.deltaX,
                deltaY: e.deltaY,
                deltaZ: e.deltaZ,
                deltaMode: e.deltaMode,
                clientX: e.clientX,
                clientY: e.clientY,
                screenX: e.screenX,
                screenY: e.screenY,
                ctrlKey: e.ctrlKey,
                shiftKey: e.shiftKey,
                altKey: e.altKey,
                metaKey: e.metaKey,
                bubbles: true,
                cancelable: true,
              })
            );
          } catch (_) {}
          try {
            win.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: "auto" });
          } catch (_) {}
        }

        function onPreviewWheel(e) {
          if (frameWrap.hidden) return;
          e.preventDefault();
          e.stopPropagation();
          focusPreviewFrame();
          forwardWheelToFrame(e);
        }

        frameWrap.addEventListener("wheel", onPreviewWheel, { passive: false, capture: true });

        frameWrap.addEventListener("pointerenter", focusPreviewFrame);
        frame.addEventListener("load", focusPreviewFrame);

        applyViewport({ label: label, w: w, h: h }, true, false);
        frameWrap.hidden = false;

        syncToolbarHeight();
        window.addEventListener("resize", syncToolbarHeight);
      })();
    </script>
  </body>
</html>
