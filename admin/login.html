<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웅진IT</title>
    <link rel="icon" href="./assets/img/favicon.ico">
    <link rel="stylesheet" href="./assets/css/overlayscrollbars.min.css">
    <link rel="stylesheet" href="./assets/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/tabulator.min.css">
    <link rel="stylesheet" href="./assets/css/adminlte.css">
    <link rel="stylesheet" href="./assets/css/customize.css">
</head>

<body class="login-page bg-body-secondary">
    <div class="login-box">
        <div class="login-logo mb-5">
            <img src="./assets/img/logo_login.png" alt="웅진IT">
        </div>
    
        <div class="card">
            <div class="card-body login-card-body">
                <form action="" method="post">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="아이디를 입력해 주세요." />
                        <div class="input-group-text">
                            <span class="bi bi-person-fill"></span>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" class="form-control" placeholder="Password" />
                        <div class="input-group-text">
                            <span class="bi bi-lock-fill"></span>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark btn-lg">로그인</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./assets/js/includes.js"></script> <!-- 퍼블리싱 임시 -->
    <script src="./assets/js/overlayscrollbars.browser.es6.min.js"></script>
    <script src="./assets/js/popper.min.js"></script>
    <script src="./assets/js/bootstrap.min.js"></script>
    <script src="./assets/js/tabulator.min.js"></script>
    <script src="./assets/js/adminlte.js"></script>
    <!-- //Scripts -->

</body>

</html>
