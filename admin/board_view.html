<!DOCTYPE html>
<html lang="ko">

<head>

    <link rel="stylesheet" href="./assets/css/adminlte.css">
    <link rel="stylesheet" href="./assets/css/flatpickr.min.css">
    <link rel="stylesheet" href="./assets/css/customize.css">
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
        <!-- header -->
        <nav class="app-header navbar navbar-expand bg-body">
            <div class="container-fluid">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                            <i class="bi bi-list"></i>
                        </a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item user-menu d-flex align-items-center me-3">
                        홍길동
                    </li>
                    <li>
                        <a href="#none" class="btn btn-secondary btn-sm float-end">
                            <i class="bi bi-box-arrow-right"></i>
                            <span class="btn-logout fw-bolder">로그아웃</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- //header -->

        <!-- menu -->
        <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
            <!-- logo -->
            <div class="sidebar-brand">
                <a href="#none" class="brand-link">
                    <img src="./assets/img/Logo_wj_w.svg" alt="woongjin" class="brand-image">
                </a>
            </div>
            <!-- //logo -->

            <!-- menu -->
            <div class="sidebar-wrapper">
                <nav class="mt-2" aria-label="Main navigation">
                    <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" data-accordion="false"
                        id="navigation">
                        <li class="nav-item">
                            <a href="login.html" class="nav-link">
                                <p>login<i class="nav-arrow bi bi-chevron-right"></i></p>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="board_list.html" class="nav-link">
                                <p>board list<i class="nav-arrow bi bi-chevron-right"></i></p>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="#" class="nav-link">
                                <p>
                                    Depth Menu
                                    <i class="nav-arrow bi bi-chevron-right"></i>
                                </p>
                            </a>
                            <ul class="nav nav-treeview">
                                <li class="nav-item">
                                    <a href="#none" class="nav-link">
                                        <p>2Depth</p>
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a href="#none" class="nav-link">

                                    <a href="#none" class="nav-link">
                                        <p>2Depth</p>
                                    </a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </nav>
            </div>
            <!-- //menu -->
        </aside>
        <!-- //menu -->

        <!-- main -->
        <main class="app-main">
            <!-- title -->
            <div class="app-content-header">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-sm-12">
                            <h3 class="mb-0">Board View</h3>
                        </div>
                    </div>
                </div>
            </div>
            <!-- //title -->

            <!-- content -->
            <div class="app-content">
                <div class="container-fluid">
                    <div class="card">
                        <div class="card-body">
                            <form action="">
                                <div class="row mb-3">
                                    <label for="title" class="col-sm-1 col-form-label text-center">제목</label>
                                    <div class="col-sm-11">
                                        <input type="text" class="form-control" id="title">
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <span class="col-sm-1 col-form-label text-center">활성여부</span>
                                    <div class="col-sm-11 d-flex align-items-center">
                                        <div class="form-check me-3">
                                            <input class="form-check-input" type="radio" name="display" id="display_y"
                                                checked="">
                                            <label class="form-check-label" for="display_y">활성</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="display" id="display_n"
                                                checked="">
                                            <label class="form-check-label" for="display_n">비활성</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <label for="period" class="col-sm-1 col-form-label text-center">노출기간</label>
                                    <div class="col-sm-11">
                                        <input type="text" class="form-control" id="period">
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <!-- //content -->
        </main>
        <!-- //main -->
    </div>

    <!-- Scripts -->
    <script src="./assets/js/overlayscrollbars.browser.es6.min.js"></script>
    <script src="./assets/js/popper.min.js"></script>
    <script src="./assets/js/bootstrap.min.js"></script>
    <script src="./assets/js/tabulator.min.js"></script>
    <script src="./assets/js/adminlte.js"></script>
    <script src="./assets/js/flatpickr.min.js"></script>
    <script src="./assets/js/flatpickr_ko.js"></script>
    <!-- //Scripts -->

    <script>
        flatpickr("#period", {
            locale: "ko",
            enableTime: true,
            mode: "range",
            time_24hr: true,
            minuteIncrement: 10
        });
    </script>
</body>

</html>
